services:
  - type: web
    name: centro-infantil-salesiano
    runtime: python
    buildCommand: pip install -r requirements.txt && python manage.py collectstatic --noinput && python manage.py migrate
    startCommand: gunicorn centro_infantil_config.wsgi:application
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: centro-infantil-db
          property: connectionString
      - key: SECRET_KEY
        generateValue: true
      - key: DEBUG
        value: "False"

databases:
  - name: centro-infantil-db
    plan: free
