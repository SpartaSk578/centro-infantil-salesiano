{% extends 'base.html' %}
{% block page_title %}{{ titulo }}{% endblock %}

{% block content %}
<div class="row justify-content-center">
  <div class="col-md-6">
    <div class="card shadow-sm border-0" style="border-radius: 12px;">
      <div class="card-header bg-white py-3">
        <h6 class="fw-bold mb-0 text-primary">
          <i class="bi bi-calendar-check me-2"></i>{{ titulo }}
        </h6>
      </div>
      <div class="card-body">
        <form method="post">
          {% csrf_token %}
          
          <div class="mb-3">
            <label class="form-label small fw-bold text-muted">Niño</label>
            {{ form.id_nino }}
          </div>
          
          <div class="row g-3 mb-3">
            <div class="col-md-6">
              <label class="form-label small fw-bold text-muted">Fecha</label>
              {{ form.fecha }}
            </div>
            <div class="col-md-6">
              <label class="form-label small fw-bold text-muted">Estado</label>
              {{ form.estado }}
            </div>
          </div>
          
          <div class="mb-3">
            <label class="form-label small fw-bold text-muted">Observaciones</label>
            {{ form.observaciones }}
          </div>
          
          <div class="d-flex gap-2">
            <button type="submit" class="btn btn-primary" style="border-radius: 8px;">
              <i class="bi bi-save me-2"></i>Guardar
            </button>
            <!-- CORRECCIÓN CLAVE: Se añadió 'asistencia:' para evitar el NoReverseMatch -->
            <a href="{% url 'asistencia:lista_asistencia' %}" class="btn btn-outline-secondary" style="border-radius: 8px;">
              Cancelar
            </a>
          </div>
        </form>
      </div>
    </div>
  </div>
</div>
{% endblock %}
