{% extends 'base.html' %}
{% block title %}Subir Documento{% endblock %}
{% block page_title %}Subir Documento — {{ nino.get_full_name }}{% endblock %}

{% block content %}
<div class="card border-0 shadow-sm" style="border-radius:16px; max-width:500px; margin:0 auto;">
    <div class="card-body p-4">
        <form method="post" enctype="multipart/form-data">
            {% csrf_token %}
            <div class="mb-3">
                <label class="form-label fw-bold">Nombre del documento</label>
                {{ form.nombre }}
            </div>
            <div class="mb-4">
                <label class="form-label fw-bold">Archivo</label>
                {{ form.archivo }}
                <div class="form-text">PDF, imágenes, Word, etc.</div>
            </div>
            <div class="d-flex gap-2">
                <button type="submit" class="btn btn-primary fw-bold px-4">
                    <i class="bi bi-upload me-1"></i>Subir
                </button>
                <a href="{% url 'ninos:detalle_nino' nino.pk %}" class="btn btn-outline-secondary">Cancelar</a>
            </div>
        </form>
    </div>
</div>
{% endblock %}
